# TradeNexus AI — Railway/Nixpacks build configuration
# Single Railway service: FastAPI backend serves the React build as static
# files under one domain. No CORS issues, one URL, simpler ops.

providers = ["python"]

[phases.setup]
nixPkgs = ["nodejs_20", "python311"]

[phases.install]
cmds = [
  "pip install -r backend/requirements.txt",
  "cd frontend && npm install --legacy-peer-deps"
]

[phases.build]
cmds = [
  # Build React app with relative API URL so it hits the same Railway domain
  "cd frontend && REACT_APP_BACKEND_URL='' npm run build"
]

[start]
cmd = "uvicorn backend.server:app --host 0.0.0.0 --port $PORT"
